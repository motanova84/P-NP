name: Validate Python Framework

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: 🔍 Collect test list
        continue-on-error: true
        run: |
          python3 -m pytest tests/ --collect-only -q 2>&1 | tail -20
      
      - name: 🧪 Run unit tests with pytest
        continue-on-error: true
        run: |
          python3 -m pytest tests/ -v --tb=short -rA --junitxml=test-results.xml 2>&1 | tail -80
      
      - name: 📝 Save test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results.xml
          retention-days: 14
      
      - name: Test IC-SAT module
        continue-on-error: true
        run: python3 src/ic_sat.py
      
      - name: Test computational dichotomy module
        continue-on-error: true
        run: python3 src/computational_dichotomy.py
      
      - name: Test Tseitin generator
        continue-on-error: true
        run: python3 src/gadgets/tseitin_generator.py
      
      - name: Run simple demo
        continue-on-error: true
        run: python3 simple_demo.py
      
      - name: Run complete demo
        continue-on-error: true
        run: python3 examples/demo_ic_sat.py
      
      - name: Test gap2_verification module
        continue-on-error: true
        run: python3 -c "import gap2_verification; results = gap2_verification.verify_ic_time_theorem([4, 6], num_trials=2); assert len(results) == 4; print('✓ gap2_verification test passed')"
