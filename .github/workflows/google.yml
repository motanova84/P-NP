# Build and Deploy to GKE
# ============================================================
# This workflow requires GCP configuration:
# 1. Set PROJECT_ID to your GCP project
# 2. Create a Workload Identity Provider for GitHub
# 3. Update GKE_CLUSTER, GAR_LOCATION, etc.
#
# Currently set to placeholder values — job automatically
# skips until configured. See:
# https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation

name: 'Build and Deploy to GKE'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: 'my-project'
  GAR_LOCATION: 'us-central1'
  GKE_CLUSTER: 'cluster-1'
  GKE_ZONE: 'us-central1-c'
  DEPLOYMENT_NAME: 'gke-test'
  REPOSITORY: 'samples'
  IMAGE: 'static-site'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'

jobs:
  setup-build-publish-deploy:
    name: 'Setup, Build, Publish, and Deploy'
    runs-on: 'ubuntu-latest'
    environment: 'production'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      # Gate: skip if GCP not configured yet
      - name: '⚙️ Check GCP configuration'
        id: gcp_check
        run: |
          if [ "$PROJECT_ID" = "my-project" ] || [ "$WORKLOAD_IDENTITY_PROVIDER" = "projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider" ]; then
            echo "status=unconfigured" >> $GITHUB_OUTPUT
            echo "⚠️  GCP workflow not configured yet."
            echo "   Set PROJECT_ID and WORKLOAD_IDENTITY_PROVIDER in google.yml"
          else
            echo "status=configured" >> $GITHUB_OUTPUT
          fi
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          WORKLOAD_IDENTITY_PROVIDER: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}

      # Only proceed if GCP is configured
      - id: 'auth'
        name: '🔐 Authenticate to Google Cloud'
        if: steps.gcp_check.outputs.status == 'configured'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'

      - name: '🐳 Docker Auth'
        if: steps.gcp_check.outputs.status == 'configured'
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: '☸️ Set up GKE credentials'
        if: steps.gcp_check.outputs.status == 'configured'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          location: '${{ env.GKE_ZONE }}'

      - name: '🏗️ Build and push Docker container'
        if: steps.gcp_check.outputs.status == 'configured'
        run: |-
          DOCKER_TAG="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"
          docker build --tag "${DOCKER_TAG}" --build-arg GITHUB_SHA="${GITHUB_SHA}" --build-arg GITHUB_REF="${GITHUB_REF}" .
          docker push "${DOCKER_TAG}"

      - name: '🔧 Set up Kustomize'
        if: steps.gcp_check.outputs.status == 'configured'
        run: |-
          curl -sfLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          chmod u+x ./kustomize

      - name: '🚀 Deploy to GKE'
        if: steps.gcp_check.outputs.status == 'configured'
        run: |-
          ./kustomize edit set image LOCATION-docker.pkg.dev/PROJECT_ID/REPOSITORY/IMAGE:TAG=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA
          ./kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/$DEPLOYMENT_NAME
          kubectl get services -o wide

      - name: '📋 Status'
        if: always()
        run: |
          if [ "${{ steps.gcp_check.outputs.status }}" = "unconfigured" ]; then
            echo "⏸️  GKE workflow skipped — GCP no configurado."
            echo "   Para activarlo: configura PROJECT_ID y WORKLOAD_IDENTITY_PROVIDER en google.yml"
          else
            echo "✅ GKE deployment completed"
          fi
