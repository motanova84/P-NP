<!DOCTYPE html>
<html lang=es>
<head><meta charset=utf-8><meta name=viewport content=width=device-width,initial-scale=1>
<title>Catedral-QCAL Wallet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c8d6e5;font-family:Courier New,monospace;padding:20px;max-width:600px;margin:auto}
h1{color:#00d4aa;font-size:1.2em;border-bottom:1px solid #1a3a3a;padding-bottom:8px;margin-bottom:15px}
.card{background:#0d0d15;border:1px solid #1a2a2a;border-radius:6px;padding:12px;margin:8px 0}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #181828;font-size:0.85em}
.lbl2{color:#666}.val2{color:#c8c8d4}.good{color:#00ff88}
.footer{text-align:center;color:#333;font-size:0.7em;margin-top:20px}
code{color:#8899aa;font-size:0.75em;word-break:break-all}
</style></head>
<body>
<h1>Catedral-QCAL Wallet</h1>
<div class=card id=info>Cargando...</div>
<div id=wallets></div>
<div class=footer id=footer></div>
<script>
async function load(){
try{
var r=await fetch('/api/v1/wallet',{headers:{'X-Api-Key':'02006fba59c3469d92cf80c8df640d9f'}})
var d=await r.json()
document.getElementById('info').innerHTML=
  '<div class=row><span class=lbl2>Balance</span><span class=val2 good>'+(d.balance/1000)+' sats</span></div>'+
  '<div class=row><span class=lbl2>Nombre</span><span class=val2>'+d.name+'</span></div>'+
  '<div class=row><span class=lbl2>ID</span><span class=val2><code>'+d.id+'</code></span></div>'
var r2=await fetch('/ecosistema')
var e=await r2.json()
var ln=e.lnbits||{}
var h='<h2 style=color:#5a8a8a;font-size:0.85em;margin:10px 0>Todas las wallets</h2>'
for(var k in ln){var w=ln[k];h+='<div class=row><span class=lbl2>'+k+'</span><span class=val2 good>'+w.balance_sats+' sats</span></div>'}
document.getElementById('wallets').innerHTML=h
document.getElementById('footer').innerHTML=new Date().toISOString().slice(0,19)+' UTC | f0 = 141.7001 Hz'
}catch(e){document.getElementById('info').innerHTML='Error: '+e.message}
}
load()
setInterval(load,30000)
</script></body></html>
