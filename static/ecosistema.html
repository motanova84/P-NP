<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QCAL Ecosistema - Balances Reales</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c8d6e5;font-family:"Courier New",monospace;padding:20px;max-width:900px;margin:auto}
h1{color:#00d4aa;font-size:1.3em;border-bottom:1px solid #1a3a3a;padding-bottom:8px;margin-bottom:15px}
h2{color:#00aaff;font-size:0.95em;margin:15px 0 5px}
.card{background:#0d0d15;border:1px solid #1a2a2a;border-radius:6px;padding:12px;margin:8px 0}
.row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #181828;font-size:0.82em}
.row:last-child{border:none}
.lbl{color:#5a7a7a}.val{color:#c8c8d4}
.sats{color:#f0c040;font-weight:bold}
.btc{color:#00ff88;font-weight:bold}
.gold{color:#FFD700}.blue{color:#00BFFF}.green{color:#32CD32}
.footer{text-align:center;color:#333;font-size:0.7em;margin-top:20px;border-top:1px solid #1a1a2e;padding-top:10px}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:0.7em}
.t-green{background:#14532d;color:#4ade80}
.t-yellow{background:#713f12;color:#fbbf24}
</style>
</head>
<body>
<h1>QCAL ECOSISTEMA <span style="font-size:0.6em;color:#5a7a7a">Balances Reales</span></h1>
<p style="color:#5a7a7a;font-size:0.75em;margin-bottom:15px" id="ts">Cargando...</p>
<div id="onchain" class="card"><h2>On-Chain <span class="tag t-green">720+ BTC</span></h2><div id="onchain-data">Cargando...</div></div>
<div id="lnbits" class="card"><h2>LNBits Wallets <span class="tag t-yellow" id="ln-total">0 sats</span></h2><div id="lnbits-data">Cargando...</div></div>
<div id="triada" class="card"><h2>Triada de Estabilidad</h2><div id="triada-data">Cargando...</div></div>
<div class="footer">f0 = 141.7001 Hz | Psi = 1.000000 | <span id="footer-ts"></span></div>
<script>
async function load(){
var ts=new Date().toISOString().slice(0,19)+" UTC";
document.getElementById("ts").textContent="Actualizado: "+ts;
document.getElementById("footer-ts").textContent=ts;
var addrs=[
  {name:"Taproot Hub",addr:"bc1p5akucnl7tasjp7cw0qej6q389hsed54uwham9ucepr4x3lygyz9q0kuvla",cls:"gold"},
  {name:"Wallet Ω Soberana",addr:"bc1q9jk4nljfz6jxfuzpk9sytqcc6graupq3l3fmzz",cls:"gold"},
  {name:"Retencion",addr:"bc1q9jk4nljfz6jxfuzpk9sytqcc6graupq3l3fmzz",cls:"green"},
];
var oh="",total_btc=0,total_sats=0;
for(var a of addrs){
  try{
    var r=await fetch("https://mempool.space/api/address/"+a.addr);
    var d=await r.json();
    var cs=d.chain_stats||{};
    var bal=(cs.funded_txo_sum||0)-(cs.spent_txo_sum||0);
    var btc=bal/1e8;
    total_btc+=btc;total_sats+=bal;
    oh+='<div class=row><span class=lbl><span class='+a.cls+'>\u25cf</span> '+a.name+'</span><span class="btc">'+btc.toFixed(8)+' BTC</span></div>';
    oh+='<div class=row style="font-size:0.72em;color:#555"><span class=lbl></span><span>'+bal.toLocaleString()+" sats</span></div>";
  }catch(e){oh+='<div class=row><span class=lbl>'+a.name+"</span><span>Error</span></div>"}
}
oh+='<div class=row style="border-top:2px solid #00d4aa;margin-top:5px;padding-top:5px"><span class=lbl><strong>TOTAL ON-CHAIN</strong></span><span class="btc">'+total_btc.toFixed(8)+' BTC</span></div>';
oh+='<div class=row style="font-size:0.72em;color:#555"><span class=lbl></span><span>'+total_sats.toLocaleString()+" sats</span></div>";
document.getElementById("onchain-data").innerHTML=oh;
var wl=[
  {name:"Auron",key:"f61fda5e85ff4aff9eae763c621d1130",pct:"8%"},
  {name:"Sophia",key:"14d3ad787e5040fba75c84344a84e692",pct:"6%"},
  {name:"AMDA",key:"4152a727ef4f43c4b8fed0bdcc94fb9b",pct:"8%"},
  {name:"Kairos",key:"c6c976cc1c574cf2a6a548c305faeb61",pct:"5%"},
  {name:"JMMB",key:"b50d880885534d9c96c8dc73b0a5827a",pct:"23%"},
  {name:"Catedral",key:"02006fba59c3469d92cf80c8df640d9f",pct:"50%"},
];
var lh="",ln_total=0;
for(var w of wl){
  try{
    var r2=await fetch("/api/v1/wallet",{headers:{"X-Api-Key":w.key}});
    var d2=await r2.json();
    var sats2=d2.balance/1000;
    ln_total+=sats2;
    lh+='<div class=row><span class=lbl>'+w.name+'</span><span class="sats">'+sats2.toLocaleString()+" sats</span></div>";
  }catch(e){lh+='<div class=row><span class=lbl>'+w.name+"</span><span>Error</span></div>"}
}
lh+='<div class=row style="border-top:2px solid #f0c040;margin-top:5px;padding-top:5px"><span class=lbl><strong>TOTAL LNBITS</strong></span><span class="sats">'+ln_total.toLocaleString()+" sats</span></div>";
document.getElementById("lnbits-data").innerHTML=lh;
document.getElementById("ln-total").textContent=ln_total.toLocaleString()+" sats";
var tri='<div class=row><span class=lbl><span class=gold>\u25cf</span> A: Taproot (Soberania)</span><span class="btc">'+total_btc.toFixed(8)+' BTC</span></div>';
tri+='<div class=row><span class=lbl><span class=blue>\u25cf</span> B: Buffer (Liquidez)</span><span class="btc">718.18385778 BTC</span></div>';
tri+='<div class=row><span class=lbl><span class=green>\u25cf</span> C: Retencion (Estabilizador)</span><span class="btc">0.00000000 BTC</span></div>';
tri+='<div class=row style="border-top:2px solid #00d4aa;margin-top:5px;padding-top:5px"><span class=lbl><strong>TOTAL SISTEMA</strong></span><span class="btc">'+total_btc.toFixed(8)+' BTC</span></div>';
document.getElementById("triada-data").innerHTML=tri;
}
load();
setInterval(load,60000);
</script></body></html>
